name: stega

services:

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: stega
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stega"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:4.3-management
    environment:
      RABBITMQ_DEFAULT_USER: stega
      RABBITMQ_DEFAULT_PASS: dev_password
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_dev
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"

  # ─── Perfil "full" ─────────────────────────────────────────────────────────
  # Roda a aplicação e todos os workers completamente containerizados.
  # Útil para validação local sem Perl instalado.
  # Uso: docker compose --profile full up --build
  #
  # Em desenvolvimento com Perl local, prefira:
  #   docker compose up -d postgres rabbitmq
  #   perl eng/migrate.pl
  #   perl script/stega daemon

  migrate:
    profiles: [full]
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRESQL_MIGRATION_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
    command: perl eng/migrate.pl
    restart: "no"

  seed:
    profiles: [full]
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
    command: perl eng/seed.pl
    restart: "no"

  app:
    profiles: [full]
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      POSTGRESQL_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
      POSTGRESQL_MIGRATION_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: stega
      RABBITMQ_PASSWORD: dev_password
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8080
      KEYCLOAK_REALM: stega
      KEYCLOAK_CLIENT_ID: stega-web
      TEST_JWT_SECRET: test_secret_apenas_para_desenvolvimento
    ports:
      - "3000:3000"
    command: perl script/stega daemon

  minion-worker:
    profiles: [full]
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: stega
      RABBITMQ_PASSWORD: dev_password
    command: perl script/stega minion worker

  notification-worker:
    profiles: [full]
    build: .
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: stega
      RABBITMQ_PASSWORD: dev_password
    command: perl eng/worker.pl

  # ─── Perfil "test" ─────────────────────────────────────────────────────────
  # Executa a suíte de testes em container isolado usando o estágio "test" do
  # Dockerfile (inclui t/; não usada em produção).
  # Uso: docker compose --profile full --profile test run --rm test

  test:
    profiles: [test]
    build:
      context: .
      target: test
    depends_on:
      seed:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
      POSTGRESQL_MIGRATION_URL: postgresql://postgres:postgres_dev@postgres:5432/stega
      TEST_JWT_SECRET: test_secret_apenas_para_desenvolvimento
      PERL5OPT: "-Mopen=:std,:encoding(UTF-8)"
    command: prove -lr --timer t/
    restart: "no"

volumes:
  postgres_data:
