name: stega

services:

  # ─── PostgreSQL — quatro instâncias dedicadas por finalidade (ADR-023) ──────
  # Mesmo motor em todas — isolamento é de processo/recursos, não de tecnologia.

  postgres-app:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: stega-app
    ports:
      - "55432:5432"
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stega-app"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-jobs:
    image: postgres:17-alpine    # mesma imagem, instância de propósito único — backend do Minion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: stega-jobs
    ports:
      - "55433:5432"
    volumes:
      - postgres_jobs_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stega-jobs"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-events:
    image: postgres:17-alpine    # imagem intocada — sem pg_cron nem extensão custom (ADR-022)
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: stega-events
    ports:
      - "55434:5432"
    volumes:
      - postgres_events_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stega-events"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-keycloak:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev
      POSTGRES_DB: keycloak
    ports:
      - "55435:5432"
    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    command: start-dev --import-realm
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres_dev
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/keycloak:/opt/keycloak/data/import
    ports:
      - "8080:8080"

  # ─── Perfil "full" ─────────────────────────────────────────────────────────
  # Roda a aplicação e todos os workers completamente containerizados.
  # Útil para validação local sem Perl instalado.
  # Uso: docker compose --profile full up --build
  #
  # Em desenvolvimento com Perl local, prefira:
  #   docker compose up -d postgres-app postgres-jobs postgres-events postgres-keycloak keycloak
  #   perl eng/migrate.pl
  #   perl eng/bootstrap_pgque.pl
  #   perl script/stega daemon

  migrate:
    profiles: [full]
    build: .
    depends_on:
      postgres-app:
        condition: service_healthy
    environment:
      POSTGRESQL_APP_URL: postgresql://postgres-app:5432/stega-app
      POSTGRESQL_APP_MIGRATION_USERNAME: postgres
      POSTGRESQL_APP_MIGRATION_PASSWORD: postgres_dev
    command: perl eng/migrate.pl
    restart: "no"

  # Instala o PgQue em db-events — passo idempotente, separado das migrations
  # de domínio (ADR-022/ADR-023): "instalar o PgQue" não é "aplicar migrations".
  bootstrap-pgque:
    profiles: [full]
    build: .
    depends_on:
      postgres-events:
        condition: service_healthy
    environment:
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
    command: perl eng/bootstrap_pgque.pl
    restart: "no"

  seed:
    profiles: [full]
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_APP_URL: postgresql://postgres-app:5432/stega-app
      POSTGRESQL_APP_USERNAME: postgres
      POSTGRESQL_APP_PASSWORD: postgres_dev
    command: perl eng/seed.pl
    restart: "no"

  # Só prepara usuários de TESTE no Keycloak (ver TESTING.md) — não é
  # configuração geral da aplicação.
  keycloak-test-users:
    profiles: [full]
    build: .
    depends_on:
      keycloak:
        condition: service_started
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: stega
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: perl eng/keycloak_test_users.pl
    restart: "no"

  app:
    profiles: [full]
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
      bootstrap-pgque:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_APP_URL: postgresql://postgres-app:5432/stega-app
      POSTGRESQL_APP_USERNAME: postgres
      POSTGRESQL_APP_PASSWORD: postgres_dev
      POSTGRESQL_JOBS_URL: postgresql://postgres-jobs:5432/stega-jobs
      POSTGRESQL_JOBS_USERNAME: postgres
      POSTGRESQL_JOBS_PASSWORD: postgres_dev
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_FRONTEND_URL: http://localhost:8080
      KEYCLOAK_REALM: stega
      KEYCLOAK_CLIENT_ID: stega-web
      TEST_JWT_SECRET: test_secret_apenas_para_desenvolvimento
    ports:
      - "3000:3000"
    command: perl script/stega daemon

  minion-worker:
    profiles: [full]
    build: .
    depends_on:
      seed:
        condition: service_completed_successfully
      bootstrap-pgque:
        condition: service_completed_successfully
    environment:
      # Stega.pm::startup configura as três instâncias Mojo::Pg
      # incondicionalmente (ADR-023), qualquer que seja o subcomando — os
      # Jobs Minion usam $app->pg (db-app, ex.: ProcessWebhookPayload cria
      # tickets) e $app->pg_events (db-events, publicação de notificações),
      # não só o backend do próprio Minion (db-jobs). Faltar qualquer uma
      # das três faz os Jobs falharem em runtime, não no boot do worker —
      # achado real ao validar o roteiro de webhooks do TESTING.md.
      POSTGRESQL_APP_URL: postgresql://postgres-app:5432/stega-app
      POSTGRESQL_APP_USERNAME: postgres
      POSTGRESQL_APP_PASSWORD: postgres_dev
      POSTGRESQL_JOBS_URL: postgresql://postgres-jobs:5432/stega-jobs
      POSTGRESQL_JOBS_USERNAME: postgres
      POSTGRESQL_JOBS_PASSWORD: postgres_dev
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
    command: perl script/stega minion worker
    # A imagem herda o HEALTHCHECK do Dockerfile (curl a /healthz na porta
    # 3000), mas este processo não serve HTTP — nunca ficaria "healthy" por
    # definição. Desabilitado aqui, não no Dockerfile, porque o app
    # (Hypnotoad) continua precisando do healthcheck real.
    healthcheck:
      disable: true

  notification-worker:
    profiles: [full]
    build: .
    depends_on:
      bootstrap-pgque:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
    command: perl script/worker
    # Ver comentário equivalente em minion-worker — não serve HTTP.
    healthcheck:
      disable: true

  # Tick de rotação do PgQue (ADR-022). EXATAMENTE uma réplica — o PgQue não
  # coordena chamadas concorrentes de ticker() fora do pg_cron.
  pgque-ticker:
    profiles: [full]
    build: .
    depends_on:
      bootstrap-pgque:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
    command: perl script/pgque_ticker
    # Ver comentário equivalente em minion-worker — não serve HTTP.
    healthcheck:
      disable: true

  # ─── Perfil "test" ─────────────────────────────────────────────────────────
  # Executa a suíte de testes em container isolado usando o estágio "test" do
  # Dockerfile (inclui t/; não usada em produção).
  # Uso: docker compose --profile full --profile test run --rm test

  test:
    profiles: [test]
    build:
      context: .
      target: test
    depends_on:
      seed:
        condition: service_completed_successfully
      bootstrap-pgque:
        condition: service_completed_successfully
    environment:
      POSTGRESQL_APP_URL: postgresql://postgres-app:5432/stega-app
      POSTGRESQL_APP_USERNAME: postgres
      POSTGRESQL_APP_PASSWORD: postgres_dev
      POSTGRESQL_APP_MIGRATION_USERNAME: postgres
      POSTGRESQL_APP_MIGRATION_PASSWORD: postgres_dev
      POSTGRESQL_JOBS_URL: postgresql://postgres-jobs:5432/stega-jobs
      POSTGRESQL_JOBS_USERNAME: postgres
      POSTGRESQL_JOBS_PASSWORD: postgres_dev
      POSTGRESQL_EVENTS_URL: postgresql://postgres-events:5432/stega-events
      POSTGRESQL_EVENTS_USERNAME: postgres
      POSTGRESQL_EVENTS_PASSWORD: postgres_dev
      TEST_JWT_SECRET: test_secret_apenas_para_desenvolvimento
      PERL5OPT: "-Mopen=:std,:encoding(UTF-8)"
    command: prove -lr --timer t/
    restart: "no"

volumes:
  postgres_app_data:
  postgres_jobs_data:
  postgres_events_data:
  postgres_keycloak_data:
